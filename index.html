<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
</head>
<body>
    <div class="result">
        <h2>Results</h2>
        <span class="comment">Choose <strong>Rock</strong>, <strong>Paper</strong>, or <strong>Scissors</strong></span>
        <br>
        <span class="humanResult">You: 0</span>
        <br>
        <span class="computerResult">Computer: 0</span>
    </div>
    <br>

    <button class="rock">Rock</button>
    <button class="paper">Paper</button>
    <button class="scissors">Scissors</button>

    <script src="main.js"></script>
</body>
</html>
